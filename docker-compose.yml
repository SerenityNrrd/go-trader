services:
  go-trader:
    build:
      context: .
      dockerfile: Dockerfile
    image: go-trader:latest
    container_name: go-trader
    restart: unless-stopped

    env_file:
      # DISCORD_BOT_TOKEN + any secrets. Created on the host once.
      - /home/angrynrrd/go_trader/.env

    environment:
      # In Docker, "localhost" = container loopback only — Coolify's reverse
      # proxy connects via the container IP, so bind all interfaces.
      GO_TRADER_STATUS_BIND: "0.0.0.0"

    volumes:
      # Persistent config + state DB (out-of-tree #1056 layout)
      - /home/angrynrrd/go_trader:/var/lib/go-trader
      # Logs (optional — comment out to keep logs in docker logs only)
      - /home/angrynrrd/go_trader/logs:/app/logs

    ports:
      # Status / UI server.
      # Coolify proxies the domain directly to this port.
      - "8199:8199"

    # Coolify healthcheck hits /health (503 while draining)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8199/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    # Mirror systemd hardening where Docker allows
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M   # HL meta/OHLCV caches (PrivateTmp equivalent)
    read_only: false    # /app/.venv and /var/lib/go-trader need writes
